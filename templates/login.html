<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Sign Language App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #06060b;
      --panel: rgba(17, 17, 32, 0.9);
      --panel-strong: rgba(22, 22, 42, 0.98);
      --border: rgba(99, 102, 241, 0.16);
      --accent: #818cf8;
      --accent-2: #22d3ee;
      --text: #e8eaf6;
      --muted: #8a90bf;
      --danger: #f87171;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      --font: 'Inter', sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      font-family: var(--font);
      background:
        radial-gradient(circle at top left, rgba(129, 140, 248, 0.18), transparent 28%),
        radial-gradient(circle at bottom right, rgba(34, 211, 238, 0.14), transparent 24%),
        linear-gradient(135deg, #05060d 0%, #0a0b14 45%, #0f1220 100%);
    }

    .login-shell {
      width: min(440px, 100%);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .hero {
      padding: 28px 28px 18px;
      background:
        linear-gradient(135deg, rgba(129, 140, 248, 0.16), rgba(34, 211, 238, 0.08)),
        var(--panel-strong);
      border-bottom: 1px solid var(--border);
    }

    .badge {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      margin-bottom: 16px;
      font-size: 24px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #05060d;
      box-shadow: 0 0 28px rgba(129, 140, 248, 0.24);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    form {
      padding: 28px;
      display: grid;
      gap: 18px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      height: 50px;
      padding: 0 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(10, 12, 22, 0.95);
      color: var(--text);
      font: inherit;
      outline: none;
    }

    .submit-btn {
      height: 52px;
      border: 0;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #05060d;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.08em;
      cursor: pointer;
    }

    .hint {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="login-shell">
    <div class="hero">
      <div class="badge">SL</div>
      <h1>Sign Language App Login</h1>
      <p class="subtitle">Authenticate before accessing the system</p>
    </div>

    <form method="post" action="/login">
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      <!-- USERNAME -->
      <div class="field">
        <label>Username</label>
        <input name="username" required>
      </div>

      <!-- EMAIL -->
      <div class="field">
        <label>Email</label>
        <input name="email" type="email" required>
      </div>

      <!-- MOBILE -->
      <div class="field">
        <label>Mobile Number</label>
        <input name="phone" required>
      </div>

      <!-- PASSWORD -->
      <div class="field">
        <label>Password</label>
        <input name="password" type="password" required>
      </div>

      <button class="submit-btn">Login</button>

      <div class="hint">
        Default credentials can be overridden with environment variables.
      </div>
    </form>
  </div>
</body>
</html>
