services:
  - type: web
    name: sign-language-app
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_VISION_MODEL
        value: "meta-llama/llama-4-scout-17b-16e-instruct"
